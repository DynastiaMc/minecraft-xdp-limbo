bind = "0.0.0.0:25567"
accept_transfers = true
fetch_player_skins = false

[forwarding]
method = "NONE"

[version_gate]
# Server's native version (shown in server list for compatible clients)
protocol = 769
version = "1.21.4"

# Accepted range (inclusive). Hard floor 766 / 1.20.5 always applies.
min_protocol = 768
min_version_name = "1.21"
# Set max_protocol = 0 for no upper limit
max_protocol = 0
max_version_name = ""

# Kick message for clients outside the range. <range> is replaced.
kick_message = "§6» §e» §6§lDYNASTIA §e« §6«\n\n§cLe serveur accepte uniquement les versions §6<range>§c."
